---
- name: Deploy WhatsUp-Earth Production Stack
  hosts: production
  become: yes
  gather_facts: yes

  tasks:
    # 1. System Update
    - name: Update package manager
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: system

    - name: Upgrade packages
      apt:
        upgrade: dist
      tags: system

    # 2. Install Dependencies
    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - build-essential
          - python3-pip
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present
      tags: dependencies

    # 3. Install Docker
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      tags: docker

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      tags: docker

    - name: Install Docker
      apt:
        name: docker-ce
        state: present
      tags: docker

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes
      tags: docker

    # 4. Install Docker Compose
    - name: Install Docker Compose
      shell: |
        curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        chmod +x /usr/local/bin/docker-compose
      tags: docker

    # 5. Create app directory
    - name: Create app directory
      file:
        path: "{{ app_path }}"
        state: directory
        mode: '0755'
      tags: app

    # 6. Clone repositories
    - name: Clone frontend repository
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_path }}/whatsup-earth"
        version: main
      tags: app

    - name: Clone backend repository
      git:
        repo: "{{ app_repo_backend }}"
        dest: "{{ app_path }}/whatsup-earth-Backend"
        version: main
      tags: app

    # 7. Create docker-compose.yml
    - name: Create docker-compose.yml
      template:
        src: docker-compose.yml.j2
        dest: "{{ app_path }}/docker-compose.yml"
      tags: docker

    # 8. Create .env file
    - name: Create .env file
      template:
        src: .env.j2
        dest: "{{ app_path }}/.env"
      tags: app

    # 9. Docker login to Docker Hub
    - name: Docker login
      shell: |
        docker login -u {{ dockerhub_username }} -p {{ dockerhub_token }}
      tags: docker

    # 10. Start Docker Compose stack
    - name: Start Docker Compose stack
      shell: |
        cd {{ app_path }}
        docker compose up -d
      tags: docker

    # 11. Wait for services to be healthy
    - name: Wait for PostgreSQL
      shell: |
        docker compose -f {{ app_path }}/docker-compose.yml exec -T postgres pg_isready -U whatsup -d whatsup_earth
      retries: 30
      delay: 10
      tags: docker

    - name: Wait for MongoDB
      shell: |
        docker compose -f {{ app_path }}/docker-compose.yml exec -T mongodb mongosh --eval "db.adminCommand('ping')"
      retries: 30
      delay: 10
      tags: docker

    # 12. Run migrations
    - name: Run database migrations
      shell: |
        cd {{ app_path }}/whatsup-earth-Backend
        docker compose -f {{ app_path }}/docker-compose.yml exec -T backend npm run migrate
      tags: database

    # 13. Run seeders
    - name: Run database seeders
      shell: |
        cd {{ app_path }}/whatsup-earth-Backend
        docker compose -f {{ app_path }}/docker-compose.yml exec -T backend npm run seed
      tags: database

    # 14. Install Cloudflare Tunnel
    - name: Install Cloudflare Tunnel
      shell: |
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        apt-get install -y ./cloudflared.deb
        rm cloudflared.deb
      tags: cloudflare

    # 15. Create Cloudflare Tunnel configuration
    - name: Create .cloudflared directory
      file:
        path: /root/.cloudflared
        state: directory
        mode: '0700'
      tags: cloudflare

    - name: Create Cloudflare credentials
      template:
        src: cloudflare_credentials.j2
        dest: /root/.cloudflared/cert.pem
        mode: '0600'
      tags: cloudflare

    - name: Create Cloudflare config
      template:
        src: cloudflare_config.yml.j2
        dest: /root/.cloudflared/config.yml
      tags: cloudflare

    # 16. Start Cloudflare Tunnel
    - name: Start Cloudflare Tunnel
      shell: |
        cloudflared service install
        systemctl start cloudflared
        systemctl enable cloudflared
      tags: cloudflare

    # 17. Verify deployment
    - name: Verify Backend API
      uri:
        url: http://localhost:5000/
        method: GET
      retries: 10
      delay: 5
      tags: verify

    - name: Verify Frontend
      uri:
        url: http://localhost:3000/
        method: GET
      retries: 10
      delay: 5
      tags: verify

    # 18. Display completion message
    - name: Print deployment summary
      debug:
        msg:
          - "=========================================="
          - "WhatsUp-Earth Deployment Complete!"
          - "=========================================="
          - "VM IP: 192.168.100.120"
          - "API URL: https://{{ api_domain }}"
          - "App URL: https://{{ app_domain }}"
          - "Backend (local): http://192.168.100.120:5000"
          - "Frontend (local): http://192.168.100.120:3000"
          - "=========================================="
      tags: verify
